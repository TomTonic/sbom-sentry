# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
---
version: 2

project_name: sbom-sentry

before:
  hooks:
    - go mod tidy

builds:
  - main: ./cmd/sbom-sentry
    binary: sbom-sentry
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.scriptVersion={{.Version}}

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^ci:'
      - '^deps-upd:'
      - Merge pull request
      - Merge branch
