name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ['1.26']
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Set up Go ${{ matrix.go-version }}
        uses: actions/setup-go@v6.4.0
        with:
          go-version: ${{ matrix.go-version }}

      - name: Build
        run: go build ./...

      - name: Test
        run: go test ./... -count=1 -timeout 120s

      - name: Test with race detector
        run: go test -race ./... -count=1 -timeout 180s

      - name: Test with coverage
        run: go test -coverprofile=coverage.out ./... -count=1 -timeout 120s

      - name: Show coverage
        run: go tool cover -func=coverage.out

      - name: Enforce coverage threshold
        run: |
          total=$(go tool cover -func=coverage.out | awk '/^total:/{gsub(/%/,""); print $3}')
          echo "Total coverage: ${total}%"
          awk -v t="$total" 'BEGIN {
            if (t+0 < 75) {
              printf "FAIL: coverage %.1f%% is below the 75%% minimum threshold\n", t+0
              exit 1
            }
            printf "PASS: coverage %.1f%% meets threshold (>= 75%%)\n", t+0
          }'

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Set up Go
        uses: actions/setup-go@v6.4.0
        with:
          go-version: '1.26'

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9.2.0
        with:
          version: latest
