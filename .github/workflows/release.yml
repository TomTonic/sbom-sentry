name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-candidate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Set up Go
        uses: actions/setup-go@v6.4.0
        with:
          go-version: '1.26'

      - name: Build Linux release candidate
        env:
          VERSION: ${{ github.ref_type == 'tag' && github.ref_name || format('dev-{0}', github.sha) }}
        run: |
          mkdir -p dist
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 \
            go build -trimpath -ldflags "-s -w -X main.scriptVersion=${VERSION}" \
            -o dist/sbom-sentry-linux-amd64 ./cmd/sbom-sentry

      - name: Upload release candidate
        uses: actions/upload-artifact@v4.6.2
        with:
          name: release-candidate
          path: dist/sbom-sentry-linux-amd64
          if-no-files-found: error

  release-test:
    runs-on: ubuntu-latest
    needs: build-candidate
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Download release candidate
        uses: actions/download-artifact@v5.0.0
        with:
          name: release-candidate
          path: dist

      - name: Ensure candidate is executable
        run: chmod +x dist/sbom-sentry-linux-amd64

      - name: Build release-test container
        run: docker build -f .github/release-test/Dockerfile -t sbom-sentry-release-test:${{ github.sha }} .

      - name: Run release-test in container
        run: docker run --rm sbom-sentry-release-test:${{ github.sha }}

  publish:
    runs-on: ubuntu-latest
    needs: release-test
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download release candidate
        uses: actions/download-artifact@v5.0.0
        with:
          name: release-candidate
          path: dist

      - name: Create checksum
        run: sha256sum dist/sbom-sentry-linux-amd64 > dist/sbom-sentry-linux-amd64.sha256

      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@v2.3.3
        with:
          generate_release_notes: true
          files: |
            dist/sbom-sentry-linux-amd64
            dist/sbom-sentry-linux-amd64.sha256
