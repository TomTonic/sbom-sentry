name: Fuzz Testing

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * 1'

permissions:
  contents: read

jobs:
  fuzz:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Set up Go
        uses: actions/setup-go@v6.4.0
        with:
          go-version: '1.26'

      - name: Fuzz identify package
        run: go test ./internal/identify -run=^$ -fuzz=FuzzIdentify -fuzztime=60s

      - name: Fuzz safeguard path validation
        run: go test ./internal/safeguard -run=^$ -fuzz=FuzzValidatePath -fuzztime=60s

      - name: Fuzz safeguard entry validation
        run: go test ./internal/safeguard -run=^$ -fuzz=FuzzValidateEntry -fuzztime=60s
